<style>
    .rss-container {
        display: flex;
        height: 70vh;
        gap: 20px;
        color: var(--text);
    }

    /* Sidebar */
    .rss-sidebar {
        width: 250px;
        flex-shrink: 0;
        border-right: 1px solid var(--hud-border);
        display: flex;
        flex-direction: column;
        padding-right: 15px;
    }

    #rss-feed-list {
        flex-grow: 1;
        overflow-y: auto;
        margin-top: 15px;
    }

    .feed-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 12px;
        margin-bottom: 5px;
        background: rgba(255, 140, 0, 0.05);
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.85rem;
    }

    .feed-item:hover {
        background: rgba(255, 140, 0, 0.1);
        border-color: var(--hud-border);
    }

    .feed-item.active {
        background: rgba(255, 140, 0, 0.2);
        border-color: var(--primary);
        box-shadow: inset 0 0 10px rgba(255, 140, 0, 0.1);
    }

    .feed-info {
        display: flex;
        gap: 10px;
        align-items: center;
        overflow: hidden;
    }

    .feed-info .title {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .delete-btn {
        background: none;
        border: none;
        color: #ff4444;
        font-size: 1.2rem;
        cursor: pointer;
        opacity: 0.3;
        transition: opacity 0.2s;
    }

    .feed-item:hover .delete-btn {
        opacity: 1;
    }

    /* Main Area */
    .rss-main {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .rss-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 140, 0, 0.2);
    }

    #rss-articles {
        flex-grow: 1;
        overflow-y: auto;
        padding-right: 10px;
        scrollbar-width: thin;
    }

    /* Article Grid Logic */
    .rss-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }

    .rss-list {
        display: flex;
        flex-direction: column;
        gap: 15px;
        max-width: 900px;
        margin: 0 auto;
    }

    .ag-card {
        background: rgba(10, 10, 10, 0.8);
        border: 1px solid var(--hud-border);
        overflow: hidden;
        transition: transform 0.2s, border-color 0.2s;
        display: flex;
    }

    .rss-list .ag-card {
        flex-direction: row;
        height: auto;
        align-items: flex-start;
        padding: 5px;
    }

    .rss-list .card-img {
        width: 90px;
        aspect-ratio: 16 / 9;
        height: auto;
        flex-shrink: 0;
    }

    .rss-grid .ag-card {
        flex-direction: column;
    }

    .rss-grid .card-img {
        width: 100%;
        aspect-ratio: 16 / 9;
        height: auto;
    }

    .ag-card:hover {
        border-color: var(--primary);
        transform: translateY(-2px);
    }

    .card-img {
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        background: #000;
    }

    .card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.8;
        transition: opacity 0.3s;
    }

    .ag-card:hover .card-img img {
        opacity: 1;
    }

    .card-content {
        padding: 0 15px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

    .card-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.65rem;
        color: var(--text-dim);
        margin-bottom: 4px;
        text-transform: uppercase;
        font-weight: 600;
    }

    .card-meta i {
        color: var(--primary);
    }

    .card-link {
        color: var(--text);
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
        display: block;
        line-height: 1.3;
        transition: color 0.2s;
        max-height: 2.6em;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
    }

    .card-link:hover {
        color: var(--primary);
    }

    .card-description {
        font-size: 0.85rem;
        color: #aaa;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    /* Modal Styling */
    .rss-modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9000;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(5px);
        align-items: center;
        justify-content: center;
    }

    .modal-box {
        background: #111;
        border: 1px solid var(--primary);
        padding: 30px;
        width: 450px;
        box-shadow: 0 0 30px rgba(255, 140, 0, 0.2);
    }

    /* Misc */
    .view-switchers {
        display: flex;
        gap: 5px;
    }

    .btn-small {
        padding: 5px 10px;
        font-size: 0.75rem;
    }

    #rss-loader {
        text-align: center;
        padding: 40px;
        color: var(--primary);
        display: none;
    }
</style>

<div class="rss-container">
    <!-- SIDEPAR -->
    <aside class="rss-sidebar">
        <button id="rss-add-btn" class="btn" style="width: 100%; margin-bottom: 10px;">+ Add Feed</button>
        
        <div id="rss-feed-list">
            <!-- Dynamic Feeds -->
        </div>

        <div style="margin-top: 20px; display: flex; gap: 5px;">
            <button id="rss-export-btn" class="btn btn-small" style="flex: 1;">Export</button>
            <button id="rss-import-btn" class="btn btn-small" style="flex: 1;">Import</button>
            <input type="file" id="rss-import-input" style="display: none;" accept=".json">
        </div>
    </aside>

    <!-- MAIN -->
    <main class="rss-main">
        <div class="rss-header">
            <h2 id="rss-view-title" class="hud-title" style="margin:0;">Global Feed</h2>
            <div class="view-switchers">
                <button class="btn btn-small" data-rss-view="grid">GRID</button>
                <button class="btn btn-small" data-rss-view="list">LIST</button>
            </div>
        </div>

        <div id="rss-loader">
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;">
                SCANNING CHANNELS...
                <div class="loader-line" style="width: 100px; height: 1px; background: var(--primary); margin: 10px auto;"></div>
            </div>
        </div>

        <div id="rss-articles">
            <!-- Dynamic Articles -->
        </div>
    </main>
</div>

<!-- ADD MODAL -->
<div id="rss-modal" class="rss-modal">
    <div class="modal-box">
        <h3 class="hud-title" style="margin-top: 0;">Add New Source</h3>
        <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">Enter RSS URL or YouTube channel link.</p>
        
        <input type="text" id="rss-url-input" placeholder="https://youtube.com/..." 
               style="width: 100%; background: #000; border: 1px solid var(--hud-border); color: #fff; padding: 12px; margin-bottom: 20px; outline: none;">
        
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button onclick="document.getElementById('rss-modal').style.display='none'" class="btn" style="background: transparent; border: 1px solid #444;">Cancel</button>
            <button id="rss-save-feed" class="btn">Add Feed</button>
        </div>
    </div>
</div>
